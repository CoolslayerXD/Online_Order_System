<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客線上點餐</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .menu-item { padding: 15px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .stock-warning { color: #e74c3c; font-size: 12px; font-weight: bold; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #ddd; background: #fff; cursor: pointer; }
        .btn { background: #3498db; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 15px; font-size: 16px; }
        .btn-secondary { background: #95a5a6; }
        .hidden { display: none; }
        .order-box { background: #e8f8f5; padding: 15px; border-radius: 5px; border: 2px dashed #1abc9c; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div id="view-loading"><h2>讀取菜單中，請稍候...</h2></div>

    <div id="view-menu" class="hidden">
        <h2>歡迎點餐（目前只接受現金付款哦~）</h2>
        <div id="menu-list"></div>
        <button class="btn" onclick="goToConfirm()">確認餐點，下一步</button>
    </div>

    <div id="view-confirm" class="hidden">
        <h2>確認您的訂單</h2>
        <div id="order-summary" style="line-height: 1.8;"></div>
        <button class="btn" onclick="submitOrder()">送出訂單</button>
        <button class="btn btn-secondary" onclick="switchView('view-menu')">返回修改</button>
    </div>

    <div id="view-success" class="hidden">
        <h2>訂單已成立！</h2>
        <div class="order-box">
            <p><strong>建立時間：</strong><span id="res-time"></span></p>
            <p><strong>訂單編號：</strong><span id="res-id" style="color: #e74c3c; font-size: 20px; font-weight:bold;"></span></p>
            <hr>
            <div id="res-items" style="text-align: left; margin: 10px 0;"></div>
            <h3 style="color: #27ae60;">總金額：<span id="res-total"></span></h3>
            <p style="color: #c0392b; font-size:12px;">⚠️ 請截圖此畫面作為取餐與付款證明</p>
        </div>
        <button class="btn" onclick="location.reload()">返回主頁 (點下一單)</button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxLgIJFuF4Dpw0UKjh-p25jr6nCeKEE7E_XRy9ZfHQK-uNoaUUFjjQOjU812SDn2PcWFw/exec";
    let menuData = [];
    let cart = {};

    // 載入即時菜單與庫存
    fetch(GAS_URL + "?action=getMenu")
        .then(res => res.json())
        .then(data => {
            menuData = data;
            data.forEach(item => cart[item.id] = 0);
            renderMenu();
            switchView('view-menu');
        });

    function renderMenu() {
        const list = document.getElementById('menu-list');
        list.innerHTML = '';
        menuData.forEach(item => {
            let stockHtml = '';
            if (item.stock === 0) {
                stockHtml = `<div class="stock-warning">已售罄</div>`;
            } else if (item.stock <= 10) {
                stockHtml = `<div class="stock-warning">最後 ${item.stock} 份</div>`;
            }

            list.innerHTML += `
                <div class="menu-item">
                    <div>
                        <strong>${item.name}</strong> ($${item.price})
                        <div id="stock-msg-${item.id}">${stockHtml}</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty('${item.id}', -1)" ${item.stock === 0 ? 'disabled' : ''}>-</button>
                        <span id="qty-${item.id}">0</span>
                        <button class="qty-btn" onclick="updateQty('${item.id}', 1)" ${item.stock === 0 ? 'disabled' : ''}>+</button>
                    </div>
                </div>
            `;
        });
    }

    function updateQty(id, change) {
        const item = menuData.find(m => m.id === id);
        const newQty = cart[id] + change;
        
        if (newQty < 0) return;
        if (newQty > item.stock) {
            alert(`【${item.name}】已達庫存上限，僅剩 ${item.stock} 份！`);
            return;
        }

        cart[id] = newQty;
        document.getElementById(`qty-${id}`).innerText = cart[id];

        // 動態更新最後X份提示
        const remain = item.stock - cart[id];
        const msgDiv = document.getElementById(`stock-msg-${id}`);
        if (remain === 0) {
            msgDiv.innerHTML = `<div class="stock-warning">已達購買上限</div>`;
        } else if (remain <= 10) {
            msgDiv.innerHTML = `<div class="stock-warning">最後 ${remain} 份</div>`;
        } else {
            msgDiv.innerHTML = '';
        }
    }

    function goToConfirm() {
        let total = 0;
        let html = '';
        menuData.forEach(item => {
            if (cart[item.id] > 0) {
                let sub = cart[item.id] * item.price;
                html += `${item.name} x ${cart[item.id]} = $${sub}<br>`;
                total += sub;
            }
        });
        if (total === 0) return alert('請先選擇餐點！');
        html += `<hr><strong>總計：$${total}</strong>`;
        document.getElementById('order-summary').innerHTML = html;
        switchView('view-confirm');
    }

    function submitOrder() {
        document.querySelector('#view-confirm .btn').innerText = '處理中...';
        document.querySelector('#view-confirm .btn').disabled = true;

        let finalCart = [];
        let itemsStr = [];
        let total = 0;
        menuData.forEach(item => {
            if (cart[item.id] > 0) {
                finalCart.push({ id: item.id, name: item.name, qty: cart[item.id] });
                itemsStr.push(`${item.name}*${cart[item.id]}`);
                total += cart[item.id] * item.price;
            }
        });

        // 移除 no-cors，因為我們需要讀取回傳的 JSON 來判斷是否搶單失敗
        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ cart: finalCart, itemsDetails: itemsStr.join(', '), totalPrice: total })
        })
        .then(res => res.json())
        .then(res => {
            if (res.status === "error") {
                // 搶單失敗，觸發防呆警告並重整
                alert(res.message);
                location.reload(); 
            } else {
                // 訂單成功
                const now = new Date();
                document.getElementById('res-time').innerText = now.toLocaleString();
                document.getElementById('res-id').innerText = res.orderId;
                document.getElementById('res-items').innerHTML = itemsStr.join('<br>');
                document.getElementById('res-total').innerText = `$${total}`;
                switchView('view-success');
            }
        })
        .catch(err => {
            alert('系統連線異常，請再試一次');
            document.querySelector('#view-confirm .btn').innerText = '送出訂單';
            document.querySelector('#view-confirm .btn').disabled = false;
        });
    }

    function switchView(id) {
        ['view-loading', 'view-menu', 'view-confirm', 'view-success'].forEach(v => {
            document.getElementById(v).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
