<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店家管理控制台</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #ecf0f1; padding: 20px; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sound-btn { padding: 10px 20px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        .sound-off { background: #e74c3c; color: white; }
        .sound-on { background: #27ae60; color: white; box-shadow: 0 0 10px #27ae60; }
        .board { display: flex; gap: 20px; }
        .column { flex: 1; background: white; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 400px; }
        .order-card { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
        .unpaid { border-left: 5px solid #e74c3c; }
    </style>
</head>
<body>

<div class="header-container">
    <h1>👨‍🍳 訂單管理看板</h1>
    <div>
        <span id="last-update" style="font-size: 12px; color: #7f8c8d;">載入中...</span>
        <button id="soundToggle" class="sound-btn sound-off" onclick="enableSound()">🔇 點擊允許播放音效</button>
    </div>
</div>

<div class="board">
    <div class="column">
        <h3>未付款訂單</h3>
        <div id="list-unpaid">讀取中...</div>
    </div>
</div>

<audio id="notificationSound" src="dingdong.mp3" preload="auto"></audio>

<script>
    // ❗請換成你最新的 GAS 網址❗
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxLgIJFuF4Dpw0UKjh-p25jr6nCeKEE7E_XRy9ZfHQK-uNoaUUFjjQOjU812SDn2PcWFw/exec";
    let lastOrderCount = 0;
    let isSoundAllowed = false;

    function enableSound() {
        const audio = document.getElementById('notificationSound');
        audio.play().then(() => {
            audio.pause();
            audio.currentTime = 0;
            isSoundAllowed = true;
            document.getElementById('soundToggle').className = "sound-btn sound-on";
            document.getElementById('soundToggle').innerText = "🔊 音效已就緒";
        }).catch(e => alert("請先在瀏覽器設定中允許此網站播放聲音"));
    }

    function fetchOrders() {
        document.getElementById('last-update').innerText = "🔄 更新中...";
        
        fetch(GAS_URL)
        .then(res => res.json())
        .then(data => {
            if (lastOrderCount !== 0 && data.length > lastOrderCount && isSoundAllowed) {
                document.getElementById('notificationSound').play();
            }
            lastOrderCount = data.length;
            renderOrders(data);
            document.getElementById('last-update').innerText = "最後更新：" + new Date().toLocaleTimeString();
        })
        .catch(err => {
            document.getElementById('list-unpaid').innerHTML = `<p style="color:red;">讀取失敗：請檢查 GAS 權限或網址是否正確</p>`;
        });
    }

    function renderOrders(data) {
        const container = document.getElementById('list-unpaid');
        container.innerHTML = '';
        data.filter(o => o.status === '未付款').forEach(order => {
            container.innerHTML += `
                <div class="order-card unpaid">
                    <strong>單號：${order.orderId}</strong>
                    <div>內容：${order.itemsDetails}</div>
                </div>
            `;
        });
        if(container.innerHTML === '') container.innerHTML = '目前無未付款訂單';
    }

    // 每 15 秒檢查一次
    setInterval(fetchOrders, 15000);
    fetchOrders();
</script>
</body>
</html>
